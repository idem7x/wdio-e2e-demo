name: E2E

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

concurrency:
  group: e2e-${{ github.ref }}
  cancel-in-progress: true

env:
  NODE_VERSION: "22"

jobs:
  web:
    name: Web (Chrome)
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Seed .env
        run: cp .env.example .env

      - name: Run web suite
        run: npm run test:web

      - name: Upload allure-results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: allure-results-web
          path: report/allure-results
          if-no-files-found: ignore

      - name: Upload wdio logs
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: wdio-logs-web
          path: report/wdio
          if-no-files-found: ignore

  android:
    name: Android (dockerised emulator + Appium)
    runs-on: ubuntu-latest
    timeout-minutes: 50
    steps:
      - uses: actions/checkout@v4

      - name: Enable KVM access
        run: |
          echo 'KERNEL=="kvm", GROUP="kvm", MODE="0666", OPTIONS+="static_node=kvm"' \
            | sudo tee /etc/udev/rules.d/99-kvm4all.rules
          sudo udevadm control --reload-rules
          sudo udevadm trigger --name-match=kvm
          ls -la /dev/kvm || (echo "::warning::/dev/kvm missing — emulator will be software-rendered and slow"; true)

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Seed .env
        run: cp .env.example .env

      - name: Fetch APK
        run: npm run apk:fetch

      - name: Boot emulator + Appium
        run: docker compose -f docker-compose.yml -f docker-compose.ci.yml up -d

      - name: Wait for Appium
        run: |
          set -e
          echo "Polling http://localhost:4723/status (up to 12 min)..."
          for i in $(seq 1 144); do
            if curl -fsS http://localhost:4723/status >/dev/null 2>&1; then
              echo "✓ Appium ready after $((i*5))s"
              exit 0
            fi
            if [ $((i % 12)) -eq 0 ]; then
              echo "--- still waiting for Appium (${i}/144, $((i*5))s elapsed) ---"
              docker compose -f docker-compose.yml -f docker-compose.ci.yml ps
            fi
            sleep 5
          done
          echo "✗ Appium did not become ready in 12 minutes"
          docker compose -f docker-compose.yml -f docker-compose.ci.yml logs --no-color
          exit 1

      - name: Wait for Android boot
        run: |
          set -e
          echo "Polling sys.boot_completed inside the container (up to 12 min)..."
          for i in $(seq 1 144); do
            state=$(docker exec wdio-android adb get-state 2>/dev/null | tr -d '\r' || true)
            if [ "$state" = "device" ]; then
              boot=$(docker exec wdio-android adb shell getprop sys.boot_completed 2>/dev/null | tr -d '\r' || true)
              if [ "$boot" = "1" ]; then
                echo "✓ Android boot complete after $((i*5))s"
                docker exec wdio-android adb devices
                exit 0
              fi
            fi
            if [ $((i % 12)) -eq 0 ]; then
              echo "--- still waiting for emulator (${i}/144, $((i*5))s elapsed; adb state='${state}') ---"
              docker exec wdio-android adb devices || true
            fi
            sleep 5
          done
          echo "✗ Emulator did not finish booting in 12 minutes"
          docker exec wdio-android adb devices || true
          docker compose -f docker-compose.yml -f docker-compose.ci.yml logs --no-color
          exit 1

      - name: Run android suite
        run: npm run test:android:docker

      - name: Dump container logs
        if: failure()
        run: docker compose -f docker-compose.yml -f docker-compose.ci.yml logs --no-color

      - name: Tear down stack
        if: always()
        run: docker compose -f docker-compose.yml -f docker-compose.ci.yml down -v

      - name: Upload allure-results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: allure-results-android
          path: report/allure-results
          if-no-files-found: ignore

      - name: Upload wdio logs
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: wdio-logs-android
          path: report/wdio
          if-no-files-found: ignore

  mix:
    name: Mix (Web + Android)
    runs-on: ubuntu-latest
    timeout-minutes: 50
    steps:
      - uses: actions/checkout@v4

      - name: Enable KVM access
        run: |
          echo 'KERNEL=="kvm", GROUP="kvm", MODE="0666", OPTIONS+="static_node=kvm"' \
            | sudo tee /etc/udev/rules.d/99-kvm4all.rules
          sudo udevadm control --reload-rules
          sudo udevadm trigger --name-match=kvm
          ls -la /dev/kvm || (echo "::warning::/dev/kvm missing — emulator will be software-rendered and slow"; true)

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Seed .env
        run: cp .env.example .env

      - name: Fetch APK
        run: npm run apk:fetch

      - name: Boot emulator + Appium
        run: docker compose -f docker-compose.yml -f docker-compose.ci.yml up -d

      - name: Wait for Appium
        run: |
          set -e
          echo "Polling http://localhost:4723/status (up to 12 min)..."
          for i in $(seq 1 144); do
            if curl -fsS http://localhost:4723/status >/dev/null 2>&1; then
              echo "✓ Appium ready after $((i*5))s"
              exit 0
            fi
            if [ $((i % 12)) -eq 0 ]; then
              echo "--- still waiting for Appium (${i}/144, $((i*5))s elapsed) ---"
              docker compose -f docker-compose.yml -f docker-compose.ci.yml ps
            fi
            sleep 5
          done
          echo "✗ Appium did not become ready in 12 minutes"
          docker compose -f docker-compose.yml -f docker-compose.ci.yml logs --no-color
          exit 1

      - name: Wait for Android boot
        run: |
          set -e
          echo "Polling sys.boot_completed inside the container (up to 12 min)..."
          for i in $(seq 1 144); do
            state=$(docker exec wdio-android adb get-state 2>/dev/null | tr -d '\r' || true)
            if [ "$state" = "device" ]; then
              boot=$(docker exec wdio-android adb shell getprop sys.boot_completed 2>/dev/null | tr -d '\r' || true)
              if [ "$boot" = "1" ]; then
                echo "✓ Android boot complete after $((i*5))s"
                docker exec wdio-android adb devices
                exit 0
              fi
            fi
            if [ $((i % 12)) -eq 0 ]; then
              echo "--- still waiting for emulator (${i}/144, $((i*5))s elapsed; adb state='${state}') ---"
              docker exec wdio-android adb devices || true
            fi
            sleep 5
          done
          echo "✗ Emulator did not finish booting in 12 minutes"
          docker exec wdio-android adb devices || true
          docker compose -f docker-compose.yml -f docker-compose.ci.yml logs --no-color
          exit 1

      - name: Run mix suite
        run: npm run test:mix:docker

      - name: Dump container logs
        if: failure()
        run: docker compose -f docker-compose.yml -f docker-compose.ci.yml logs --no-color

      - name: Tear down stack
        if: always()
        run: docker compose -f docker-compose.yml -f docker-compose.ci.yml down -v

      - name: Upload allure-results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: allure-results-mix
          path: report/allure-results
          if-no-files-found: ignore

      - name: Upload wdio logs
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: wdio-logs-mix
          path: report/wdio
          if-no-files-found: ignore

  publish-report:
    name: Publish Allure report
    needs: [web, android, mix]
    if: always() && github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    permissions:
      contents: write
    concurrency:
      group: allure-pages
      cancel-in-progress: false
    steps:
      - uses: actions/checkout@v4

      - name: Download all allure-results
        uses: actions/download-artifact@v4
        with:
          pattern: allure-results-*
          path: allure-results
          merge-multiple: true

      - name: Checkout gh-pages history
        uses: actions/checkout@v4
        with:
          ref: gh-pages
          path: gh-pages
        continue-on-error: true

      - name: Build Allure report with history
        uses: simple-elf/allure-report-action@v1.9
        with:
          allure_results: allure-results
          gh_pages: gh-pages
          allure_history: allure-history
          keep_reports: 20

      - name: Deploy to GitHub Pages
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_branch: gh-pages
          publish_dir: allure-history
          keep_files: false
